<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación de Desempeño Laboral</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <main class="contenedor">
        <header class="cabecera">
            <h1>Evaluación de Desempeño Laboral</h1>
            <p>Ingresa los datos del colaborador y los puntajes por criterio</p>
        </header>

        <form id="formularioEvaluacion" novalidate>
            <div class="grupo-input">
                <label for="nombre">Nombre del colaborador</label>
                <input type="text" id="nombre" placeholder="Ej: María González" required>
            </div>

            <div class="grupo-input">
                <label for="cargo">Cargo</label>
                <input type="text" id="cargo" placeholder="Ej: Analista de Proyectos" required>
            </div>

            <div class="grilla-criterios">
                <div class="encabezados">
                    <span>CRITERIO</span>
                    <span>PUNTAJE (1-10)</span>
                    <span>PESO (%)</span>
                </div>

                <div class="fila-criterio">
                    <input type="text" id="nombreCriterio1" value="Puntualidad">
                    <input type="number" id="puntaje1" min="1" max="10" step="0.1" placeholder="1-10">
                    <input type="number" id="peso1" min="0" max="100" class="input-peso" placeholder="%">
                </div>

                <div class="fila-criterio">
                    <input type="text" id="nombreCriterio2" value="Trabajo en equipo">
                    <input type="number" id="puntaje2" min="1" max="10" step="0.1" placeholder="1-10">
                    <input type="number" id="peso2" min="0" max="100" class="input-peso" placeholder="%">
                </div>

                <div class="fila-criterio">
                    <input type="text" id="nombreCriterio3" value="Calidad del trabajo">
                    <input type="number" id="puntaje3" min="1" max="10" step="0.1" placeholder="1-10">
                    <input type="number" id="peso3" min="0" max="100" class="input-peso" placeholder="%">
                </div>

                <div class="fila-criterio">
                    <input type="text" id="nombreCriterio4" value="Productividad">
                    <input type="number" id="puntaje4" min="1" max="10" step="0.1" placeholder="1-10">
                    <input type="number" id="peso4" min="0" max="100" class="input-peso" placeholder="%">
                </div>

                <div class="fila-criterio">
                    <input type="text" id="nombreCriterio5" value="Iniciativa">
                    <input type="number" id="puntaje5" min="1" max="10" step="0.1" placeholder="1-10">
                    <input type="number" id="peso5" min="0" max="100" class="input-peso" placeholder="%">
                </div>
            </div>

            <div class="resumen-pesos">
                <span>Suma actual de pesos:</span>
                <span id="sumaPesosActual">0%</span>
            </div>

            <div id="contenedorErrores" class="oculto"></div>

            <button type="submit" id="btnCalcular">Calcular evaluación</button>

            <div id="contenedorResultado" class="oculto">
                <h3 id="resultadoNombre">&nbsp;</h3>
                <p>Nota Final: <strong id="resultadoNota"></strong></p>
                <p>Categoría: <strong id="resultadoCategoria"></strong></p>
            </div>
        </form>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
